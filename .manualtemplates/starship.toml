palette = 'mono_gradient'

[palettes.mono_gradient]
color_fg = '#e5e5e5'
color_host = '#7f8489'
color_host_text = '#191a1b'
color_1 = '#7f8489'
color_2 = '#6d7277'
color_3 = '#5c6065'
color_4 = '#4c5055'
color_5 = '#3f4347'
color_6 = '#34383c'
color_7 = '#2b2f33'
color_8 = '#22262a'

[os]
disabled = false
style = "bg:color_host fg:color_host_text"
format = "[$symbol ]($style)"

[hostname]
disabled = false
ssh_only = false
style = "bg:color_host fg:color_host_text"
format = "[$hostname ]($style)"

